// Excel File Upload Handler
function handleExcelUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  const statusEl = document.getElementById('excel-status');
  const statusText = document.getElementById('excel-status-text');

  statusEl.className = 'ocr-status visible processing';
  statusText.textContent = 'Reading Excel file...';

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      
      // Get the first sheet
      const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
      
      // Convert to JSON with header row detection
      const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: '' });
      
      statusText.textContent = 'Parsing trades...';
      
      parsedTrades = parseExcelData(jsonData);

      if (parsedTrades.length === 0) {
        statusText.textContent = '⚠ No trades found. Check if this is a valid MT5 Excel export.';
        statusEl.className = 'ocr-status visible error';
      } else {
        const dupCount = markDuplicates(parsedTrades);
        statusText.textContent = dupCount > 0
          ? `✓ Found ${parsedTrades.length} trade${parsedTrades.length !== 1 ? 's' : ''} (${dupCount} already in journal, unchecked)`
          : `✓ Found ${parsedTrades.length} trade${parsedTrades.length !== 1 ? 's' : ''}`;
        statusEl.className = 'ocr-status visible success';
        showImportPreview(parsedTrades);
      }
    } catch (err) {
      statusText.textContent = '✗ Error reading file: ' + err.message;
      statusEl.className = 'ocr-status visible error';
    }
  };
  reader.onerror = function() {
    statusText.textContent = '✗ Error reading file';
    statusEl.className = 'ocr-status visible error';
  };
  reader.readAsArrayBuffer(file);
}

// Parse Excel Data from MT5
function parseExcelData(jsonData) {
  const trades = [];
  
  // Find the header row (usually row 5 based on the structure)
  let headerRowIdx = -1;
  let colMap = {};
  
  for (let i = 0; i < Math.min(20, jsonData.length); i++) {
    const row = jsonData[i];
    if (row &amp;&amp; row[0] === 'Time' &amp;&amp; row[2] === 'Symbol') {
      headerRowIdx = i;
      // Map columns
      colMap = {
        time: 0,
        position: 1,
        symbol: 2,
        type: 3,
        volume: 4,
        price: 5,
        sl: 6,
        tp: 7,
        closeTime: 8,
        closePrice: 9,
        commission: 10,
        swap: 11,
        profit: 12
      };
      break;
    }
  }
  
  if (headerRowIdx === -1) {
    console.error('Could not find header row in Excel file');
    return trades;
  }
  
  // Parse trades starting from the row after header
  for (let i = headerRowIdx + 1; i < jsonData.length; i++) {
    const row = jsonData[i];
    if (!row || !row[colMap.time] || row[colMap.time] === 'Positions') continue;
    
    try {
      const openTime = row[colMap.time];
      const closeTime = row[colMap.closeTime];
      
      // Skip if no close time (open position)
      if (!closeTime || closeTime === '') continue;
      
      // Parse dates
      const openDate = parseExcelDate(openTime);
      const closeDate = parseExcelDate(closeTime);
      
      if (!openDate || !closeDate) continue;
      
      const symbol = (row[colMap.symbol] || '').toString().replace(/micro$/i, '').toUpperCase();
      const type = (row[colMap.type] || '').toString().toLowerCase();
      const volume = parseFloat(row[colMap.volume]) || 0;
      const entry = parseFloat(row[colMap.price]) || 0;
      const exit = parseFloat(row[colMap.closePrice]) || 0;
      const sl = parseFloat(row[colMap.sl]) || null;
      const tp = parseFloat(row[colMap.tp]) || null;
      const profit = parseFloat(row[colMap.profit]) || 0;
      
      // Skip if invalid data
      if (!symbol || !type || volume === 0 || entry === 0 || exit === 0) continue;
      
      const trade = {
        date: closeDate,
        pair: symbol,
        direction: type === 'buy' ? 'buy' : 'sell',
        asset: detectAssetClass(symbol),
        lots: volume.toString(),
        entry: entry.toString(),
        exit: exit.toString(),
        sl: sl ? sl.toString() : '',
        tp: tp ? tp.toString() : '',
        pnl: profit,
        rulesFollowed: 'all',
        worked: '',
        failed: '',
        notes: 'Imported from MT5 Excel',
        workedTags: [],
        failedTags: [],
        selected: true // Default to selected
      };
      
      trades.push(trade);
    } catch (e) {
      console.error('Error parsing row:', e);
      continue;
    }
  }
  
  // Apply date filter
  return applyDateFilter(trades);
}

// Parse Excel date (handles both string and number formats)
function parseExcelDate(dateValue) {
  if (!dateValue) return null;
  
  // If it's a number (Excel serial date)
  if (typeof dateValue === 'number') {
    const date = new Date((dateValue - 25569) * 86400 * 1000);
    return date.toISOString().split('T')[0];
  }
  
  // If it's a string
  const dateStr = dateValue.toString();
  
  // Try different formats
  // Format: 2026.06.09 20:43:51
  if (dateStr.match(/^\d{4}\.\d{2}\.\d{2}/)) {
    return dateStr.replace(/\./g, '-').substring(0, 10);
  }
  
  // Format: 2026-06-09 20:43:51
  if (dateStr.match(/^\d{4}-\d{2}-\d{2}/)) {
    return dateStr.substring(0, 10);
  }
  
  return null;
}

// Apply date filter based on selection
function applyDateFilter(trades) {
  const filterType = document.getElementById('excel-date-filter').value;
  const today = new Date().toISOString().split('T')[0];
  
  if (filterType === 'today') {
    return trades.filter(t => t.date === today);
  }

  if (filterType === 'week') {
    const from = startOfWeekStr();
    return trades.filter(t => t.date >= from &amp;&amp; t.date <= today);
  }

  if (filterType === 'month') {
    const from = startOfMonthStr();
    return trades.filter(t => t.date >= from &amp;&amp; t.date <= today);
  }

  if (filterType === 'year') {
    const from = `${new Date().getFullYear()}-01-01`;
    return trades.filter(t => t.date >= from &amp;&amp; t.date <= today);
  }
  
  if (filterType === 'last') {
    // Sort by date descending and return only the last one
    trades.sort((a, b) => b.date.localeCompare(a.date));
    return trades.length > 0 ? [trades[0]] : [];
  }
  
  if (filterType === 'custom') {
    const fromDate = document.getElementById('excel-date-from').value;
    const toDate = document.getElementById('excel-date-to').value;
    
    if (fromDate &amp;&amp; toDate) {
      return trades.filter(t => t.date >= fromDate &amp;&amp; t.date <= toDate);
    }
  }
  
  // 'all' - return all trades
  return trades;
}

// Toggle custom date range visibility
function toggleDateRange() {
  const filterType = document.getElementById('excel-date-filter').value;
  const customRange = document.getElementById('custom-date-range');
  
  if (filterType === 'custom') {
    customRange.style.display = 'block';
  } else {
    customRange.style.display = 'none';
  }
}

// === Duplicate detection for imports ===
function tradeSignature(t) {
  const round = (n) => Math.round((parseFloat(n) || 0) * 10000) / 10000;
  return [
    t.date,
    (t.pair || '').toUpperCase().trim(),
    (t.direction || '').toLowerCase(),
    round(t.entry),
    round(t.exit),
    round(t.lots),
    round(t.pnl)
  ].join('|');
}

function getExistingSignatures() {
  return new Set(getCurrentJournal().map(tradeSignature));
}

function markDuplicates(trades) {
  const existing = getExistingSignatures();
  let dupCount = 0;
  trades.forEach(t => {
    t.isDuplicate = existing.has(tradeSignature(t));
    if (t.isDuplicate) {
      t.selected = false;
      dupCount++;
    } else if (t.selected === undefined) {
      t.selected = true;
    }
  });
  return dupCount;
}

// MT5 Text Parser
function parseMT5Text() {
  const text = document.getElementById('mt5-paste-input').value.trim();
  if (!text) {
    showToast('Please paste your MT5 trade history first.', 'error');
    return;
  }

  parsedTrades = parseMT5Format(text);

  if (parsedTrades.length === 0) {
    showToast('No trades found. Supported formats: MT5 Terminal copy, MT5 CSV export, or custom (date, pair, type, volume, entry, exit, profit).', 'error', 7000);
    return;
  }

  const dupCount = markDuplicates(parsedTrades);
  if (dupCount > 0) {
    showToast(`Found ${dupCount} trade${dupCount !== 1 ? 's' : ''} already in your journal — unchecked automatically so they won't be duplicated.`, 'info', 6000);
  }

  showImportPreview(parsedTrades);
}

function parseMT5Format(text) {
  const trades = [];
  const lines = text.split('\n').filter(line => line.trim());

  // Check if it's a markdown table format
  if (lines.some(line => line.trim().startsWith('|'))) {
    return parseMarkdownTable(text);
  }

  for (let line of lines) {
    // Skip header lines
    const lower = line.toLowerCase();
    if (lower.includes('position') || lower.includes('ticket') || lower.includes('open time') || 
        lower.includes('close time') || lower.includes('order') || lower.trim() === '' ||
        lower.startsWith('date') || lower.startsWith('time') || lower.includes('symbol') ||
        lower.includes('volume') || lower.includes('type')) {
      continue;
    }

    let trade = null;

    // Try tab-separated format (MT5 Terminal copy) - PRIORITY
    if (line.includes('\t')) {
      const parts = line.split('\t').map(p => p.trim());
      trade = parseTradeParts(parts);
    }

    // Try CSV format (comma-separated) - but be careful with prices that use commas
    if (!trade &amp;&amp; line.includes(',') &amp;&amp; !line.match(/\d\s\d/)) {
      const parts = line.split(',').map(p => p.trim());
      trade = parseTradeParts(parts);
    }

    // Try space-separated format
    if (!trade) {
      const parts = line.split(/\s+/).filter(p => p);
      if (parts.length >= 6) {
        // Combine date and time if separate
        if (parts[0].match(/^\d{4}[.\-\/]\d{2}[.\-\/]\d{2}$/) &amp;&amp; parts[1].match(/^\d{2}:\d{2}(:\d{2})?$/)) {
          parts[0] = parts[0] + ' ' + parts[1];
          parts.splice(1, 1);
        }
        trade = parseTradeParts(parts);
      }
    }

    if (trade) trades.push(trade);
  }

  return trades;
}

// Parse markdown table format
function parseMarkdownTable(text) {
  const trades = [];
  const lines = text.split('\n').filter(line => line.trim().startsWith('|'));
  
  if (lines.length < 3) return trades; // Need header, separator, and at least one data row

  // Parse header to find column positions
  const headerLine = lines[0];
  const headers = headerLine.split('|').map(h => h.trim().toLowerCase());
  
  // Find column indices
  const colMap = {};
  headers.forEach((h, idx) => {
    if (h.includes('time') &amp;&amp; h.includes('open')) colMap.timeOpen = idx;
    else if (h.includes('type')) colMap.type = idx;
    else if (h.includes('volume')) colMap.volume = idx;
    else if (h.includes('open') &amp;&amp; h.includes('price')) colMap.openPrice = idx;
    else if (h.includes('s/l') || h.includes('stop')) colMap.sl = idx;
    else if (h.includes('t/p') || h.includes('take')) colMap.tp = idx;
    else if (h.includes('time') &amp;&amp; h.includes('close')) colMap.timeClosed = idx;
    else if (h.includes('close') &amp;&amp; h.includes('price')) colMap.closePrice = idx;
    else if (h.includes('profit')) colMap.profit = idx;
    else if (h.includes('symbol') || h.includes('pair')) colMap.symbol = idx;
  });

  // Get default symbol from input
  const defaultSymbol = document.getElementById('default-symbol')?.value || 'GOLD';
  const defaultAssetClass = document.getElementById('default-asset-class')?.value || 'forex';

  // Process each data row (skip header and separator)
  for (let i = 2; i < lines.length; i++) {
    const line = lines[i];
    const cells = line.split('|').map(c => c.trim());
    
    if (cells.length < 5) continue;

    try {
      // Extract values
      const timeOpen = cells[colMap.timeOpen] || '';
      const type = (cells[colMap.type] || '').toLowerCase();
      const volume = cells[colMap.volume] || '';
      const openPrice = cells[colMap.openPrice] || '';
      const sl = cells[colMap.sl] || '';
      const tp = cells[colMap.tp] || '';
      const closePrice = cells[colMap.closePrice] || '';
      const profitStr = (cells[colMap.profit] || '').replace(/\*\*/g, '').replace(/[+\-]/g, m => m === '+' ? '' : '-');
      const symbol = colMap.symbol ? (cells[colMap.symbol] || defaultSymbol) : defaultSymbol;

      // Parse date
      let date = '';
      if (timeOpen.match(/^\d{4}-\d{2}-\d{2}/)) {
        date = timeOpen.substring(0, 10);
      } else if (timeOpen.match(/^\d{4}\.\d{2}\.\d{2}/)) {
        date = timeOpen.replace(/\./g, '-').substring(0, 10);
      }

      if (!date) continue;

      // Parse profit
      const profit = parseFloat(profitStr) || 0;

      // Clean up values (handle dashes for missing)
      const cleanSL = sl === '—' || sl === '-' ? '' : sl;
      const cleanTP = tp === '—' || tp === '-' ? '' : tp;

      // Detect asset class
      let asset = detectAssetClass(symbol);
      
      // If symbol is the default value, use the selected default asset class
      if (symbol === defaultSymbol) {
        asset = defaultAssetClass;
      }

      trades.push({
        date: date,
        pair: symbol.replace(/micro$/i, '').toUpperCase(),
        direction: type === 'buy' ? 'buy' : 'sell',
        asset: asset,
        lots: volume,
        entry: openPrice,
        exit: closePrice,
        sl: cleanSL,
        tp: cleanTP,
        pnl: profit,
        rulesFollowed: 'all',
        worked: '',
        failed: '',
        notes: 'Imported from MT5',
        workedTags: [],
        failedTags: [],
        id: 'j_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9)
      });
    } catch (e) {
      console.error('Error parsing row:', e);
      continue;
    }
  }

  return trades;
}

function parseTradeParts(parts) {
  try {
    if (parts.length < 5) return null;

    // Find date (first part)
    let date = parts[0];
    let dateFormatted = '';

    // Parse date formats: &quot;2024.01.15 10:30:00&quot; or &quot;2024.01.15&quot; or &quot;2024-01-15&quot; or &quot;2024/01/15&quot;
    if (date.match(/^\d{4}[.\-\/]\d{2}[.\-\/]\d{2}/)) {
      dateFormatted = date.replace(/[.\-\/]/g, '-').substring(0, 10);
    } else {
      return null;
    }

    // Find direction (buy/sell)
    let direction = 'buy';
    let directionIdx = -1;
    for (let i = 1; i < parts.length; i++) {
      const p = parts[i].toLowerCase();
      if (p === 'buy' || p === 'sell' || p === 'long' || p === 'short' || p === 'b' || p === 's') {
        direction = (p === 'buy' || p === 'long' || p === 'b') ? 'buy' : 'sell';
        directionIdx = i;
        break;
      }
    }

    if (directionIdx === -1) return null;

    // Find symbol/pair (usually after direction or before direction)
    let pair = '';
    let pairIdx = -1;
    for (let i = 1; i < parts.length; i++) {
      const p = parts[i];
      // Check if it looks like a trading symbol (including micro accounts like GOLDmicro)
      if (p.match(/^[A-Za-z0-9]{3,15}$/) &amp;&amp; !p.match(/^\d+\.?\d*$/) &amp;&amp; 
          !p.toLowerCase().match(/^(buy|sell|long|short|b|s|position|ticket|time|date|symbol|volume|type)$/)) {
        pair = p;
        pairIdx = i;
        break;
      }
    }

    if (!pair) return null;

    // Clean up symbol name for display (remove &quot;micro&quot; suffix but keep for detection)
    const displayPair = pair.replace(/micro$/i, '').toUpperCase();

    // Helper function to parse prices with spaces and commas
    function parsePrice(priceStr) {
      if (!priceStr) return '';
      // Remove spaces (thousands separator) and replace comma with dot (decimal)
      const cleaned = priceStr.replace(/\s/g, '').replace(',', '.');
      const num = parseFloat(cleaned);
      return isNaN(num) ? '' : num.toString();
    }

    // Extract numeric values after symbol
    const numericParts = [];
    const rawParts = [];
    for (let i = pairIdx + 1; i < parts.length; i++) {
      const parsed = parsePrice(parts[i]);
      if (parsed) {
        numericParts.push(parseFloat(parsed));
        rawParts.push(parsed);
      }
    }

    // Extract values
    let lots = '';
    let entry = '';
    let exit = '';
    let sl = '';
    let tp = '';
    let profit = 0;

    // Format: volume, entry, SL, TP (open positions)
    // OR: volume, entry, exit, profit (closed trades)
    if (numericParts.length >= 4) {
      lots = numericParts[0].toString();
      entry = rawParts[1];
      
      // Check if these are SL/TP or exit/profit
      // If the 3rd and 4th values are close to entry, they're likely SL/TP
      const val2 = numericParts[2];
      const val3 = numericParts[3];
      
      // Simple heuristic: if values are in reasonable range of entry, treat as SL/TP
      const entryNum = numericParts[1];
      const diff2 = Math.abs(val2 - entryNum) / entryNum;
      const diff3 = Math.abs(val3 - entryNum) / entryNum;
      
      if (diff2 < 0.1 &amp;&amp; diff3 < 0.1) {
        // Likely SL and TP
        sl = rawParts[2];
        tp = rawParts[3];
      } else {
        // Likely exit and profit
        exit = rawParts[2];
        profit = numericParts[3];
      }
    } else if (numericParts.length === 3) {
      lots = numericParts[0].toString();
      entry = rawParts[1];
      sl = rawParts[2];
    } else if (numericParts.length === 2) {
      lots = numericParts[0].toString();
      entry = rawParts[1];
    } else {
      return null;
    }

    // Auto-detect asset class
    const asset = detectAssetClass(displayPair);

    return {
      date: dateFormatted,
      pair: displayPair,
      direction: direction,
      asset: asset,
      lots: lots,
      entry: entry,
      exit: exit,
      sl: sl,
      tp: tp,
      pnl: profit,
      rulesFollowed: 'all',
      worked: '',
      failed: '',
      notes: 'Imported from MT5',
      workedTags: [],
      failedTags: [],
      id: 'j_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9)
    };
  } catch (e) {
    console.error('Parse error:', e);
    return null;
  }
}

function showImportPreview(trades) {
  const resultEl = document.getElementById('import-result');
  const countEl = document.getElementById('import-result-count');
  const selectedCountEl = document.getElementById('selected-count');
  const tbody = document.getElementById('import-preview-tbody');

  countEl.textContent = `${trades.length} trade${trades.length !== 1 ? 's' : ''} found`;
  
  // Update selected count
  const selectedCount = trades.filter(t => t.selected !== false).length;
  const dupTotal = trades.filter(t => t.isDuplicate).length;
  selectedCountEl.textContent = dupTotal > 0
    ? `${selectedCount} selected · ${dupTotal} duplicate${dupTotal !== 1 ? 's' : ''} unchecked`
    : `${selectedCount} selected`;

  tbody.innerHTML = trades.map((t, idx) => {
    const pnlClass = t.pnl > 0 ? 'pnl-positive' : t.pnl < 0 ? 'pnl-negative' : 'pnl-zero';
    const pnlStr = t.pnl > 0 ? `+$${t.pnl.toFixed(2)}` : t.pnl < 0 ? `-$${Math.abs(t.pnl).toFixed(2)}` : `$0.00`;
    const lots = t.lots ? parseFloat(t.lots).toFixed(2) : '—';
    const sl = t.sl || '—';
    const tp = t.tp || '—';
    const exit = t.exit || '—';
    const checked = t.selected !== false ? 'checked' : '';
    const rowStyle = t.isDuplicate ? 'opacity:0.5;' : '';
    const dupBadge = t.isDuplicate ? ` <span style=&quot;font-size:0.65rem;color:var(--text-muted);border:1px solid var(--border);border-radius:4px;padding:0.1rem 0.4rem;white-space:nowrap;&quot;>already in journal</span>` : '';
    
    return `<tr style=&quot;${rowStyle}&quot;>
      <td style=&quot;text-align:center&quot;><input type=&quot;checkbox&quot; ${checked} onchange=&quot;toggleTradeSelection(${idx})&quot;></td>
      <td style=&quot;font-family:'DM Mono',monospace;font-size:0.78rem&quot;>${formatDate(t.date)}</td>
      <td style=&quot;font-weight:600;font-size:0.85rem&quot;>${t.pair}${dupBadge}</td>
      <td><span class=&quot;badge badge-${t.direction}&quot; style=&quot;font-size:0.7rem&quot;>${t.direction.toUpperCase()}</span></td>
      <td><span class=&quot;badge badge-asset ${t.asset}&quot; style=&quot;font-size:0.7rem&quot;>${t.asset.toUpperCase()}</span></td>
      <td style=&quot;font-family:'DM Mono',monospace;font-size:0.78rem;text-align:center&quot;>${lots}</td>
      <td style=&quot;font-family:'DM Mono',monospace;font-size:0.78rem&quot;>${t.entry}</td>
      <td style=&quot;font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--red)&quot;>${sl}</td>
      <td style=&quot;font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--green)&quot;>${tp}</td>
      <td style=&quot;font-family:'DM Mono',monospace;font-size:0.78rem&quot;>${exit}</td>
      <td class=&quot;${pnlClass}&quot; style=&quot;font-weight:700;font-size:0.85rem&quot;>${pnlStr}</td>
    </tr>`;
  }).join('');

  resultEl.classList.add('visible');
}

function toggleTradeSelection(idx) {
  if (parsedTrades[idx]) {
    parsedTrades[idx].selected = !parsedTrades[idx].selected;
    const selectedCount = parsedTrades.filter(t => t.selected !== false).length;
    document.getElementById('selected-count').textContent = `${selectedCount} selected`;
  }
}

function selectAllTrades() {
  parsedTrades.forEach(t => t.selected = true);
  showImportPreview(parsedTrades);
}

function deselectAllTrades() {
  parsedTrades.forEach(t => t.selected = false);
  showImportPreview(parsedTrades);
}

function removeImportTrade(idx) {
  parsedTrades.splice(idx, 1);
  if (parsedTrades.length === 0) {
    document.getElementById('import-result').classList.remove('visible');
  } else {
    showImportPreview(parsedTrades);
  }
}

function cancelImport() {
  parsedTrades = [];
  document.getElementById('import-result').classList.remove('visible');
}

function confirmImport() {
  // Filter only selected trades
  const selectedTrades = parsedTrades.filter(t => t.selected !== false);
  
  if (selectedTrades.length === 0) {
    showToast('No trades selected. Please check at least one trade to import.', 'error');
    return;
  }

  // Clean up trades (remove selected property)
  const cleanTrades = selectedTrades.map(t => {
    const { selected, ...rest } = t;
    return rest;
  });

  // Add selected trades to current account's journal
  const journal = getCurrentJournal();
  state.journal[state.currentAccount] = [...cleanTrades, ...journal];
  saveJournal();
  renderJournal();

  showToast(`Successfully imported ${selectedTrades.length} trade${selectedTrades.length !== 1 ? 's' : ''} to ${state.currentAccount}!`, 'success');
  closeImportModal();
}

// Drag and drop for Excel
function setupDropZone(zoneId, inputId) {
  const dropZone = document.getElementById(zoneId);
  if (!dropZone) return;

  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });

  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('dragover');
  });

  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const files = e.dataTransfer.files;
    if (files.length > 0) {
      const input = document.getElementById(inputId);
      const event = { target: { files: [files[0]] } };
      if (inputId === 'excel-file-input') {
        handleExcelUpload(event);
      }
    }
  });
}

let deferredInstallPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  const btn = document.getElementById('pwa-install-btn');
  if (btn) btn.style.display = 'inline-flex';
});

async function installPWA() {
  const btn = document.getElementById('pwa-install-btn');
  if (deferredInstallPrompt) {
    deferredInstallPrompt.prompt();
    const { outcome } = await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    if (btn) btn.style.display = 'none';
  } else {
    showToast('To install: on iPhone use Share → Add to Home Screen. On desktop Chrome/Edge, use the install icon in the address bar.', 'info', 8000);
  }
}

window.addEventListener('appinstalled', () => {
  const btn = document.getElementById('pwa-install-btn');
  if (btn) btn.style.display = 'none';
  deferredInstallPrompt = null;
});

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch((err) => {
      console.warn('Service worker registration failed:', err);
    });
  });
}

<style>
:root{
  --bg:#0a0e1a;

*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}

.topbar{

.brand-title{font-weight:700;font-size:15px;letter-spacing:.2px}

.tabs{display:flex;gap:4px;flex:1;justify-content:center;flex-wrap:wrap}
.tab{
  background:transparent;color:var(--muted);border:1px solid transparent;
  padding:8px 14px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;
  transition:all .2s;
}
.tab:hover{color:var(--text);background:rgba(255,255,255,.03)}
.tab.active{color:#fff;background:rgba(91,140,255,.15);border-color:rgba(91,140,255,.3)}
.topright{display:flex;gap:12px;align-items:center}
.kpi{display:flex;flex-direction:column;padding:6px 12px;background:rgba(255,255,255,.03);border-radius:8px;border:1px solid var(--line)}
.kpi .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.kpi .val{font-weight:700;font-family:'JetBrains Mono',monospace;font-size:13px}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--up);box-shadow:0 0 12px var(--up);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* VIEWS */
.view{display:none;animation:fade .3s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:20px}

/* CARDS */
.card{

  border:1px solid var(--line);
  border-radius:16px;padding:18px;margin-bottom:20px;
  box-shadow:0 4px 20px rgba(0,0,0,.2);
}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.card-header h3{margin:0;font-size:15px;font-weight:600}
.pill{
  padding:4px 10px;background:rgba(91,140,255,.15);color:var(--accent);border-radius:20px;
  font-size:11px;font-weight:600;letter-spacing:.4px;border:1px solid rgba(91,140,255,.3)
}
.pill.up{background:rgba(38,208,124,.15);color:var(--up);border-color:rgba(38,208,124,.3)}
.pill.dn{background:rgba(255,84,112,.15);color:var(--dn);border-color:rgba(255,84,112,.3)}
.muted{color:var(--muted);font-size:12px}

.compass{display:flex;justify-content:center;margin:0 -8px}
canvas{max-width:100%;display:block;border-radius:10px}

.tf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.tf{padding:10px;background:rgba(255,255,255,.02);border:1px solid var(--line);border-radius:10px}
.tf-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.tf-toggle{display:flex;gap:2px;background:rgba(0,0,0,.3);padding:2px;border-radius:8px}
.tf-toggle button{
  flex:1;background:transparent;color:var(--muted);border:none;padding:5px;font-size:11px;
  font-weight:600;cursor:pointer;border-radius:6px;transition:all .15s;
}
.tf-toggle button:hover{color:var(--text)}
.tf-toggle button.active[data-v=&quot;bull&quot;]{background:var(--up);color:#0a0e1a}
.tf-toggle button.active[data-v=&quot;bear&quot;]{background:var(--dn);color:#0a0e1a}
.tf-toggle button.active[data-v=&quot;neu&quot;]{background:var(--muted);color:#0a0e1a}

.kz-list{display:flex;flex-direction:column;gap:8px}
.kz-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 12px;background:rgba(255,255,255,.02);border:1px solid var(--line);
  border-radius:10px;transition:all .2s;
}
.kz-item.active{border-color:var(--accent);background:rgba(91,140,255,.08);box-shadow:0 0 0 1px var(--accent) inset}
.kz-name{font-weight:600;font-size:13px;display:flex;align-items:center;gap:8px}

.pb-step b{display:block;color:var(--accent);font-size:12px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.pb-step span{font-size:12px;color:var(--muted);line-height:1.4}
.pb-arrow{display:flex;align-items:center;color:var(--accent);font-size:20px}
@media(max-width:900px){.pb-arrow{transform:rotate(90deg);justify-content:center}}

.check-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:6px;max-height:520px;overflow-y:auto}
.check-item{
  display:flex;align-items:center;gap:12px;padding:10px 12px;
  background:rgba(255,255,255,.02);border:1px solid var(--line);border-radius:8px;
  cursor:pointer;user-select:none;transition:all .15s;
}
.check-item:hover{background:rgba(91,140,255,.06)}
.check-item.checked{background:rgba(38,208,124,.08);border-color:rgba(38,208,124,.3)}
.check-box{
  width:20px;height:20px;border:2px solid var(--line);border-radius:5px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .15s;
}
.check-item.checked .check-box{background:var(--up);border-color:var(--up)}
.check-item.checked .check-box::after{content:&quot;✓&quot;;color:#0a0e1a;font-weight:800;font-size:14px}
.check-txt{flex:1;font-size:13px}
.check-cat{font-size:10px;padding:2px 8px;background:rgba(91,140,255,.15);color:var(--accent);border-radius:10px;text-transform:uppercase;letter-spacing:.4px}
.check-cat.htf{background:rgba(124,92,255,.15);color:var(--accent2)}
.check-cat.ltf{background:rgba(245,182,66,.15);color:var(--warn)}
.check-cat.risk{background:rgba(255,84,112,.15);color:var(--dn)}

.score-bar{height:8px;background:rgba(255,255,255,.05);border-radius:20px;overflow:hidden;margin:16px 0 10px}
.score-fill{height:100%;background:var(--grad);width:0%;transition:width .4s cubic-bezier(.4,0,.2,1)}
.verdict{text-align:center;font-size:13px;color:var(--muted);padding:8px}
.verdict.pass{color:var(--up);font-weight:600}
.verdict.warn{color:var(--warn);font-weight:600}
.verdict.fail{color:var(--dn);font-weight:600}

/* FORMS */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.form-grid label{display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.form-grid input,.form-grid select{

.form-grid input:focus,.form-grid select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,140,255,.15)}

.btn.ghost{background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--line)}
.btn.ghost:hover{background:rgba(255,255,255,.1)}
.btn.danger{background:rgba(255,84,112,.15);color:var(--dn);border:1px solid rgba(255,84,112,.3)}

.chart-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;font-size:12px;color:var(--muted)}
.chart-legend span{display:flex;align-items:center;gap:6px}
.lg{width:14px;height:8px;border-radius:2px;display:inline-block}
.lg-bos{background:var(--up)}
.lg-choch{background:var(--warn)}

.lg-fvg{background:rgba(124,92,255,.4)}
.lg-sweep{background:var(--dn)}

/* RESULT BLOCK */
.result-block{display:flex;flex-direction:column;gap:8px}
.result-row{
  display:flex;justify-content:space-between;padding:12px 14px;
  background:rgba(255,255,255,.02);border:1px solid var(--line);border-radius:8px;font-size:13px;

.result-row b{font-family:'JetBrains Mono',monospace}

.tbl{width:100%;border-collapse:collapse;font-size:13px}

.tbl tbody tr:hover{background:rgba(91,140,255,.05)}
.tbl td{font-family:'JetBrains Mono',monospace}

/* KILLZONE GRID */
.kz-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.kz-card{
  padding:14px;border-radius:12px;border:1px solid var(--line);
  background:rgba(255,255,255,.02);position:relative;overflow:hidden;
}
.kz-card::before{content:&quot;&quot;;position:absolute;top:0;left:0;right:0;height:3px;background:var(--kzcolor,var(--accent))}
.kz-card.active{border-color:var(--kzcolor);box-shadow:0 0 24px rgba(91,140,255,.25)}
.kz-card h4{margin:0 0 6px;font-size:14px}
.kz-card .kz-hours{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:8px}
.kz-card .kz-desc{font-size:12px;color:var(--muted);line-height:1.5}
.kz-status{position:absolute;top:12px;right:12px;font-size:10px;font-weight:700;text-transform:uppercase;padding:3px 8px;border-radius:20px;background:rgba(38,208,124,.15);color:var(--up);display:none}
.kz-card.active .kz-status{display:block}

.ribbon-legend{display:flex;gap:16px;margin-top:10px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.ribbon-legend .lg{width:14px;height:10px}

/* MINI LIST */
.mini-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:6px}
.mini-list li{padding:8px 10px;background:rgba(255,255,255,.02);border:1px solid var(--line);border-radius:6px;font-size:12px}
.mini-list b{color:var(--warn);font-family:'JetBrains Mono',monospace;margin-right:8px}

/* CONCEPTS */
.concept-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px}
.concept-card{
  background:linear-gradient(180deg,var(--panel),var(--bg2));
  border:1px solid var(--line);border-radius:14px;padding:16px;
  transition:all .2s;
}
.concept-card:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 12px 32px rgba(91,140,255,.15)}
.concept-card h4{margin:0 0 4px;font-size:15px;display:flex;align-items:center;gap:8px}
.concept-card h4 .tag{font-size:10px;padding:2px 8px;background:var(--grad);border-radius:20px;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.concept-card p{color:var(--muted);font-size:12px;line-height:1.55;margin:8px 0}
.concept-card canvas{width:100%;height:140px;background:rgba(0,0,0,.3);border-radius:8px;margin:8px 0}

/* FOOTER */
.foot{text-align:center;color:var(--muted);font-size:11px;padding:20px 0}

/* SCROLLBAR */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

  <script>
/* SMC Strategy Builder — main app */
// ============ STATE ============
const state = {
  bias: {H4:'neu', M15:'neu'},
  checklist: {},
  trade: {dir:'long'},
  journal: JSON.parse(localStorage.getItem('smc_journal') || '[]'),
  account: 10000,
  risk: 0.25,
};

// ============ TABS ============
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('view-'+t.dataset.tab).classList.add('active');
    if(t.dataset.tab==='builder') drawChartSim();
    if(t.dataset.tab==='killzones') drawSessionRibbon();
    if(t.dataset.tab==='concepts') drawConcepts();
  });
});

// ============ BIAS TF TOGGLES ============
document.querySelectorAll('.tf').forEach(tfEl=>{
  const tf=tfEl.dataset.tf;
  tfEl.querySelectorAll('.tf-toggle button').forEach(b=>{
    b.addEventListener('click',()=>{
      tfEl.querySelectorAll('button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      state.bias[tf]=b.dataset.v;
      drawBiasCompass();
      updateBiasPill();
    });
  });
});

function updateBiasPill(){
  const vals=Object.values(state.bias);
  const bull=vals.filter(v=>v==='bull').length;
  const bear=vals.filter(v=>v==='bear').length;
  const pill=document.getElementById('biasPill');
  if(bull===2){pill.textContent='Strongly Bullish (H4+M15 aligned)';pill.className='pill up'}
  else if(bear===2){pill.textContent='Strongly Bearish (H4+M15 aligned)';pill.className='pill dn'}
  else if(bull>bear){pill.textContent='Bullish Lean';pill.className='pill up'}
  else if(bear>bull){pill.textContent='Bearish Lean';pill.className='pill dn'}
  else{pill.textContent='Neutral';pill.className='pill'}
}

function drawBiasCompass(){
  // Two-gauge bias meter: H4 (top-down bias) and M15 (entry-timeframe bias)
  const c=document.getElementById('biasCompass');
  const ctx=c.getContext('2d');
  const W=c.width,H=c.height;
  ctx.clearRect(0,0,W,H);
  const tfs=Object.keys(state.bias); // ['H4','M15']
  const padX=44;
  const barW=W-padX*2;
  const rowH=88;
  const startY=64;
  tfs.forEach((tf,i)=>{
    const y=startY+i*rowH;
    // timeframe label
    ctx.fillStyle='#e6ecff';ctx.font='700 13px Inter';ctx.textAlign='left';
    ctx.fillText(tf,padX,y-24);
    // current state label
    const v=state.bias[tf];
    const val=v==='bull'?1:v==='bear'?-1:0;
    const color=v==='bull'?'#26d07c':v==='bear'?'#ff5470':'#5b8cff';
    ctx.fillStyle=color;ctx.font='600 11px Inter';ctx.textAlign='right';
    ctx.fillText(v==='bull'?'BULLISH':v==='bear'?'BEARISH':'NEUTRAL',padX+barW,y-24);
    // track
    ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=10;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(padX,y);ctx.lineTo(padX+barW,y);ctx.stroke();
    // center tick
    ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=2;ctx.lineCap='butt';
    ctx.beginPath();ctx.moveTo(padX+barW/2,y-9);ctx.lineTo(padX+barW/2,y+9);ctx.stroke();
    // filled segment from center to marker
    const mx=padX+barW/2 + val*(barW/2-14);
    ctx.strokeStyle=color;ctx.lineWidth=10;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(padX+barW/2,y);ctx.lineTo(mx,y);ctx.stroke();
    // marker dot
    ctx.beginPath();ctx.arc(mx,y,9,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
    ctx.strokeStyle='#0a0e1a';ctx.lineWidth=2;ctx.stroke();
    // end labels
    ctx.fillStyle='#5b6788';ctx.font='10px Inter';ctx.textAlign='left';
    ctx.fillText('BEAR',padX,y+24);
    ctx.textAlign='right';
    ctx.fillText('BULL',padX+barW,y+24);
  });
}

// ============ KILLZONES ============
// All times in UTC (base) — ICT killzones referenced to NY time
// We'll convert display to local browser tz
const KILLZONES=[
  {name:'Asia Range', color:'#3b82f6', startUTC:0, endUTC:5, desc:'Accumulation. Mark Asia high/low as liquidity pools for London to sweep.'},
  {name:'London Open KZ', color:'#8b5cf6', startUTC:7, endUTC:10, desc:'Judas swing above/below Asia range. Highest probability manipulation window.'},
  {name:'NY AM KZ', color:'#f59e0b', startUTC:12, endUTC:15, desc:'Silver Bullet 10-11 NY. Reversal off London high/low, sweep + CHoCH.'},
  {name:'NY PM KZ', color:'#ef4444', startUTC:18, endUTC:20, desc:'Continuation or reversal into close. Watch for macro window reversals.'},
  {name:'London Close', color:'#14b8a6', startUTC:15, endUTC:16, desc:'Range compression. Fade highs/lows created in NY AM.'},
];

function fmtLocalHour(utcH){
  const d=new Date();
  d.setUTCHours(utcH,0,0,0);
  return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

function isActive(kz){
  const now=new Date();
  const h=now.getUTCHours() + now.getUTCMinutes()/60;
  if(kz.startUTC<kz.endUTC) return h>=kz.startUTC &amp;&amp; h<kz.endUTC;
  return h>=kz.startUTC || h<kz.endUTC;
}

function renderKZList(){
  const el=document.getElementById('kzList');
  el.innerHTML='';
  let activeName=null;
  KILLZONES.forEach(kz=>{
    const active=isActive(kz);
    if(active) activeName=kz.name;
    const div=document.createElement('div');
    div.className='kz-item'+(active?' active':'');
    div.innerHTML=`
      <div class=&quot;kz-name&quot;><span class=&quot;dot&quot; style=&quot;background:${kz.color}&quot;></span>${kz.name}</div>
      <div class=&quot;kz-time&quot;>${fmtLocalHour(kz.startUTC)} – ${fmtLocalHour(kz.endUTC)}</div>`;
    el.appendChild(div);
  });
  const pill=document.getElementById('activeZone');
  if(activeName){pill.textContent='LIVE: '+activeName;pill.className='pill up'}
  else{pill.textContent='No active KZ';pill.className='pill'}
}

function renderKZGrid(){
  const el=document.getElementById('kzGrid');
  if(!el) return;
  el.innerHTML='';

// ============ SESSION RIBBON ============
function drawSessionRibbon(){
  const c=document.getElementById('sessionRibbon');
  if(!c) return;
  const ctx=c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  const W=c.width, H=c.height;
  const barY=50, barH=40;
  // 24 hour ticks
  ctx.fillStyle='#8a95b2';ctx.font='10px JetBrains Mono';ctx.textAlign='center';
  for(let i=0;i<=24;i+=2){
    const x=i*W/24;
    ctx.fillText(i+':00', x, 30);
    ctx.strokeStyle='rgba(255,255,255,.05)';
    ctx.beginPath();ctx.moveTo(x,35);ctx.lineTo(x,barY+barH+10);ctx.stroke();
  }
  const sessions=[
    {name:'Asia',s:23,e:5,c:'#3b82f6'},
    {name:'London',s:7,e:15,c:'#8b5cf6'},
    {name:'NY AM',s:12,e:16,c:'#f59e0b'},
    {name:'NY PM',s:16,e:20,c:'#ef4444'},
  ];
  sessions.forEach((s,idx)=>{
    const y=barY + idx*4;
    const h=barH - idx*4;
    if(s.s>s.e){
      ctx.fillStyle=s.c+'aa';
      ctx.fillRect(s.s*W/24, y, (24-s.s)*W/24, h);
      ctx.fillRect(0, y, s.e*W/24, h);
    }else{
      ctx.fillStyle=s.c+'aa';
      ctx.fillRect(s.s*W/24, y, (s.e-s.s)*W/24, h);
    }
  });
  // current time marker
  const now=new Date();
  const nowH=now.getUTCHours()+now.getUTCMinutes()/60;
  const nx=nowH*W/24;
  ctx.strokeStyle='#e8c65a';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(nx,barY-8);ctx.lineTo(nx,barY+barH+8);ctx.stroke();
  ctx.fillStyle='#e8c65a';ctx.fillRect(nx-2,barY-10,4,4);
  ctx.textAlign='left';ctx.font='11px JetBrains Mono';
  ctx.fillText('NOW (UTC)', nx+6, barY-4);
}

function computeTradeOutputs(){
  const e=+$('tbEntry').value, sl=+$('tbSL').value, t1=+$('tbTP1').value, t2=+$('tbTP2').value;
  const dir=state.trade.dir;
  if(!e||!sl){['outRisk','outR1','outR2','outRR1','outRR2','outLots'].forEach(x=>$(x).textContent='—');return}
  const risk=Math.abs(e-sl);
  const r1=t1?Math.abs(t1-e):0;
  const r2=t2?Math.abs(t2-e):0;
  const rr1=risk?(r1/risk):0;
  const rr2=risk?(r2/risk):0;
  $('outRisk').textContent=risk.toFixed(5);
  $('outR1').textContent=r1?r1.toFixed(5):'—';
  $('outR2').textContent=r2?r2.toFixed(5):'—';
  $('outRR1').textContent=rr1?('1:'+rr1.toFixed(2)):'—';
  $('outRR2').textContent=rr2?('1:'+rr2.toFixed(2)):'—';
  // rough lot size using pip val = 10 forex default
  const sym=$('tbSymbol').value;
  let pipVal=10, pipSize=0.0001;
  if(sym.includes('JPY')) pipSize=0.01;
  if(sym==='XAUUSD'){pipSize=0.1;pipVal=1}
  if(sym==='US30'||sym==='NAS100'||sym==='SPX500'||sym==='GER40'){pipSize=1;pipVal=1}
  if(sym.startsWith('BTC')||sym.startsWith('ETH')||sym.startsWith('SOL')){pipSize=1;pipVal=1}
  const slPips=risk/pipSize;
  const riskAmt=state.account*(state.risk/100);
  const lots=slPips>0?(riskAmt/(slPips*pipVal)):0;
  $('outLots').textContent=lots.toFixed(2);
}

// ============ CHART SIM ============
function drawChartSim(){
  const c=$('chartSim');
  if(!c) return;
  const ctx=c.getContext('2d');
  const W=c.width, H=c.height;
  ctx.clearRect(0,0,W,H);
  // grid
  ctx.strokeStyle='rgba(255,255,255,.04)';
  for(let i=0;i<10;i++){const y=i*H/10;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  for(let i=0;i<24;i++){const x=i*W/24;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  // fabricated candles telling SMC story: uptrend, sweep high, CHoCH, retrace to OB, entry, TP
  const candles=[];
  let p=200;
  const n=48;
  // trend up
  for(let i=0;i<20;i++){const o=p;p+=Math.random()*8-2;candles.push({o,c:p,h:Math.max(o,p)+Math.random()*4,l:Math.min(o,p)-Math.random()*4,bull:p>o})}
  // sweep high (spike + close red)
  const swept={o:p,c:p-8,h:p+18,l:p-10,bull:false};candles.push(swept);p=swept.c;
  // CHoCH down
  for(let i=0;i<6;i++){const o=p;p-=Math.random()*8+2;candles.push({o,c:p,h:Math.max(o,p)+Math.random()*3,l:Math.min(o,p)-Math.random()*3,bull:false})}
  // retrace up to OB
  const obLow=p+4, obHigh=p+12;
  for(let i=0;i<8;i++){const o=p;p+=Math.random()*5+1;candles.push({o,c:p,h:Math.max(o,p)+Math.random()*2,l:Math.min(o,p)-Math.random()*2,bull:true})}
  // reject from OB
  for(let i=0;i<n-candles.length;i++){const o=p;p-=Math.random()*7+1;candles.push({o,c:p,h:Math.max(o,p)+Math.random()*2,l:Math.min(o,p)-Math.random()*3,bull:false})}
  // scale
  const highs=candles.map(k=>k.h), lows=candles.map(k=>k.l);
  const min=Math.min(...lows)-4, max=Math.max(...highs)+4;
  const pad=40;
  const scale=v=>H-pad - (v-min)/(max-min)*(H-pad*2);
  const cw=(W-40)/candles.length;
  // draw sweep highlight
  const sweptIdx=20;
  const sweptC=candles[sweptIdx];
  ctx.fillStyle='rgba(255,84,112,.15)';
  ctx.fillRect(20+cw*sweptIdx-4, scale(sweptC.h)-4, cw+8, scale(sweptC.l)-scale(sweptC.h)+8);
  ctx.strokeStyle='#ff5470';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
  ctx.strokeRect(20+cw*sweptIdx-4, scale(sweptC.h)-4, cw+8, scale(sweptC.l)-scale(sweptC.h)+8);
  ctx.setLineDash([]);
  ctx.fillStyle='#ff5470';ctx.font='bold 11px Inter';ctx.textAlign='center';
  ctx.fillText('Liquidity Sweep', 20+cw*sweptIdx+cw/2, scale(sweptC.h)-10);
  // OB zone
  ctx.fillStyle='rgba(91,140,255,.18)';
  ctx.fillRect(20, scale(obHigh), W-40, scale(obLow)-scale(obHigh));
  ctx.strokeStyle='#5b8cff';ctx.strokeRect(20, scale(obHigh), W-40, scale(obLow)-scale(obHigh));
  ctx.fillStyle='#5b8cff';ctx.textAlign='left';
  ctx.fillText('Bearish OB / POI', 26, scale(obHigh)+14);
  // FVG (between candle 26 and 28)
  const fvgTop=candles[28].h, fvgBot=candles[26].l;
  ctx.fillStyle='rgba(124,92,255,.18)';
  ctx.fillRect(20+cw*26, scale(fvgTop), cw*3, scale(fvgBot)-scale(fvgTop));
  ctx.fillStyle='#7c5cff';ctx.fillText('FVG',20+cw*26+4, scale(fvgTop)+12);
  // candles
  candles.forEach((k,i)=>{
    const x=20+cw*i+cw/2;
    ctx.strokeStyle=k.bull?'#26d07c':'#ff5470';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,scale(k.h));ctx.lineTo(x,scale(k.l));ctx.stroke();
    ctx.fillStyle=k.bull?'#26d07c':'#ff5470';
    const bt=scale(Math.max(k.o,k.c)), bb=scale(Math.min(k.o,k.c));
    ctx.fillRect(x-cw*0.35, bt, cw*0.7, Math.max(1,bb-bt));
  });
  // CHoCH label
  const chochY=scale(candles[19].l);
  ctx.strokeStyle='#f5b642';ctx.lineWidth=1.5;ctx.setLineDash([5,3]);
  ctx.beginPath();ctx.moveTo(20+cw*10,chochY);ctx.lineTo(20+cw*27,chochY);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#f5b642';ctx.fillText('CHoCH — trend shift', 20+cw*10+4, chochY-4);
  // BOS
  const bosY=scale(candles[10].h);
  ctx.strokeStyle='#26d07c';ctx.setLineDash([5,3]);
  ctx.beginPath();ctx.moveTo(20+cw*5,bosY);ctx.lineTo(20+cw*19,bosY);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#26d07c';ctx.fillText('BOS — trend continues', 20+cw*5+4, bosY-4);
  // Entry/SL/TP arrows
  const entryY=scale((obLow+obHigh)/2);
  const slY=scale(obHigh+3);
  const tpY=scale(min+6);
  ctx.strokeStyle='#e8c65a';ctx.setLineDash([2,3]);
  ctx.beginPath();ctx.moveTo(W-160, entryY);ctx.lineTo(W-20, entryY);ctx.stroke();
  ctx.strokeStyle='#ff5470';
  ctx.beginPath();ctx.moveTo(W-160, slY);ctx.lineTo(W-20, slY);ctx.stroke();
  ctx.strokeStyle='#26d07c';
  ctx.beginPath();ctx.moveTo(W-160, tpY);ctx.lineTo(W-20, tpY);ctx.stroke();
  ctx.setLineDash([]);
  ctx.textAlign='right';
  ctx.fillStyle='#e8c65a';ctx.fillText('ENTRY',W-24,entryY-4);
  ctx.fillStyle='#ff5470';ctx.fillText('SL',W-24,slY-4);
  ctx.fillStyle='#26d07c';ctx.fillText('TP (external liq)',W-24,tpY-4);
}

// ============ RISK CALCULATOR ============
function calcRisk(){
  const bal=+$('rcBalance').value;
  const risk=+$('rcRisk').value;
  const type=$('rcType').value;
  const e=+$('rcEntry').value, sl=+$('rcSL').value;
  const pipVal=+$('rcPipVal').value;
  let pipSize=0.0001;
  if(type==='jpy') pipSize=0.01;
  if(type==='xau') pipSize=0.1;
  if(type==='index') pipSize=1;
  if(type==='crypto') pipSize=1;
  const dist=Math.abs(e-sl);
  const pips=dist/pipSize;
  const riskAmt=bal*(risk/100);
  const lots=pips>0?(riskAmt/(pips*pipVal)):0;
  $('rcRiskAmt').textContent='$'+riskAmt.toFixed(2);
  $('rcSLdist').textContent=pips.toFixed(1)+' '+(type==='index'||type==='crypto'?'pts':'pips');
  $('rcLots').textContent=lots.toFixed(2)+' lots';
  $('rcMicro').textContent=(lots*100).toFixed(0)+' micro';
  $('rcLoss').textContent='-$'+riskAmt.toFixed(2);
  $('rcTP2R').textContent='+$'+(riskAmt*2).toFixed(2);
  $('rcTP3R').textContent='+$'+(riskAmt*3).toFixed(2);
  state.account=bal;state.risk=risk;
  $('hdrAccount').textContent='$'+bal.toLocaleString();
  $('hdrRisk').textContent=risk+'%';
  renderRcTable();
}

function updateJournalStats(){
  const closed=state.journal.filter(t=>t.result==='win'||t.result==='loss');
  const wins=closed.filter(t=>t.result==='win').length;
  const wr=closed.length?(wins/closed.length*100):null;
  $('statWR').textContent=wr!==null?wr.toFixed(0)+'%':'—';
  $('statWRsub').textContent=closed.length?`${wins}W / ${closed.length-wins}L`:'No trades logged';
  const avgR=closed.length? (closed.reduce((s,t)=>{
    const rr=parseFloat((t.rr+'').replace('1:',''))||0;
    return s + (t.result==='win'?rr:-1);
  },0)/closed.length):null;
  $('statR').textContent=avgR!==null?avgR.toFixed(2)+'R':'—';
}

function candleSet(ctx,candles,W,H){
  const highs=candles.map(k=>k.h), lows=candles.map(k=>k.l);
  const min=Math.min(...lows)-2, max=Math.max(...highs)+2;
  const scale=v=>H-10 - (v-min)/(max-min)*(H-20);
  const cw=W/candles.length;
  candles.forEach((k,i)=>{
    const x=cw*i+cw/2;
    ctx.strokeStyle=k.bull?'#26d07c':'#ff5470';
    ctx.beginPath();ctx.moveTo(x,scale(k.h));ctx.lineTo(x,scale(k.l));ctx.stroke();
    ctx.fillStyle=k.bull?'#26d07c':'#ff5470';
    const bt=scale(Math.max(k.o,k.c)), bb=scale(Math.min(k.o,k.c));
    ctx.fillRect(x-cw*0.35, bt, cw*0.7, Math.max(1,bb-bt));
  });
  return scale;
}
